services:
  web:
    build: .
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      - ./data:/app/data
    environment:
      FLASK_DEBUG: "false"
      PORT: "5000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
